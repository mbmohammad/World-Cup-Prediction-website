services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wcpass}
      POSTGRES_DB: ${POSTGRES_DB:-wcdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wcuser} -d ${POSTGRES_DB:-wcdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-wcuser}:${POSTGRES_PASSWORD:-wcpass}@postgres:5432/${POSTGRES_DB:-wcdb}?sslmode=disable",
        "up"
      ]
    restart: "no"

  backend:
    build:
      context: ./backend
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-wcuser}:${POSTGRES_PASSWORD:-wcpass}@postgres:5432/${POSTGRES_DB:-wcdb}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
